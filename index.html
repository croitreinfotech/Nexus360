<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus360 - Business Assessment</title>

<style>
body { font-family: Arial; background:#f4f6f8; padding:20px; }
.container { max-width:900px; margin:auto; background:#fff; padding:25px; border-radius:10px; }
h2 { background:#1f3c88; color:#fff; padding:10px; border-radius:5px; }
label { display:block; margin-top:15px; font-weight:bold; }
select, textarea, input { width:100%; padding:8px; margin-top:5px; border-radius:5px; border:1px solid #ccc; }
.checkbox-group label { font-weight:normal; }
button { margin-top:20px; padding:12px; width:100%; background:#1f3c88; color:#fff; border:none; border-radius:5px; font-size:16px; }
#message { margin-top:15px; font-weight:bold; color:green; }
</style>
</head>

<body>

<div class="container">
<h1>Nexus360 - Business Assessment</h1>

<form id="nexusForm">

<!-- COMPANY DETAILS -->
<h2>Company Details</h2>

<label>Company Name</label>
<input type="text" name="company_name" required>

<label>Contact Person</label>
<input type="text" name="contact_person" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Phone</label>
<input type="text" name="phone" required>

<!-- SECTION 1 -->
<h2>SECTION 1: Business Basics</h2>

<label>Industry</label>
<select name="industry" required>
<option value="">-- Select --</option>
<option>IT / SaaS</option>
<option>Hospitality</option>
<option>Construction</option>
<option>Retail</option>
<option>Other</option>
</select>

<label>Team Size</label>
<select name="team_size" required>
<option value="">-- Select --</option>
<option>1–10</option>
<option>11–25</option>
<option>26–50</option>
<option>50+</option>
</select>

<label>Monthly Revenue</label>
<select name="revenue" required>
<option value="">-- Select --</option>
<option>&lt;5L</option>
<option>5–20L</option>
<option>20–50L</option>
<option>50L+</option>
</select>

<label>Owner Involvement</label>
<select name="owner_level" required>
<option value="">-- Select --</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option>
</select>

<!-- SECTION 2 -->
<h2>SECTION 2: Reality Mapping</h2>

<label>Workflow Clarity</label>
<select name="workflow_clarity" required>
<option value="">-- Select --</option>
<option>Yes</option>
<option>Partial</option>
<option>No</option>
</select>

<label>Execution Gap</label>
<select name="execution_gap" required>
<option value="">-- Select --</option>
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<!-- SECTION 3 -->
<h2>SECTION 3: Process & Systems</h2>

<label>SOP Availability</label>
<select name="sop" required>
<option value="">-- Select --</option>
<option>Yes</option>
<option>Partial</option>
<option>No</option>
</select>

<label>Process Clarity</label>
<select name="process_clarity" required>
<option value="">-- Select --</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option>
</select>

<!-- SECTION 4 -->
<h2>SECTION 4: People & Structure</h2>

<label>Roles Defined</label>
<select name="roles" required>
<option value="">-- Select --</option>
<option>Yes</option>
<option>Partial</option>
<option>No</option>
</select>

<label>Accountability</label>
<select name="accountability" required>
<option value="">-- Select --</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option>
</select>

<!-- SECTION 5 -->
<h2>SECTION 5: Performance</h2>

<label>KPI Tracking</label>
<select name="kpi" required>
<option value="">-- Select --</option>
<option>Yes</option>
<option>No</option>
</select>

<label>Time Efficiency</label>
<select name="time_efficiency" required>
<option value="">-- Select --</option>
<option>1</option><option>2</option><option>3</option><option>4</option>
<option>5</option><option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option>
</select>

<button type="submit">Submit Assessment</button>
<div id="message"></div>

</form>
</div>

<script>
const form = document.getElementById("nexusForm");
const message = document.getElementById("message");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const formData = new FormData(form);
    const data = {};

    formData.forEach((value, key) => {
        if (data[key]) {
            data[key] = [].concat(data[key], value);
        } else {
            data[key] = value;
        }
    });

    fetch("YOUR_GOOGLE_SCRIPT_URL_HERE", {
        method: "POST",
        body: JSON.stringify(data),
        mode: "no-cors"
    });

    message.innerText = "Submitted successfully!";
    form.reset();
});
</script>

</body>
</html>
